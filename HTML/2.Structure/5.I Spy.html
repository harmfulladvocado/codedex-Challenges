<!DOCTYPE html>
<html>
<head>
  <title>I Spy</title>
  <style>
    div {
      width: 200px;
      height: 150px;
      margin: 10px;
    }
    .object1 {
      background-color: #FF6B6B;
    }
    .object2 {
      background-color: #4ECDC4;
    }
    .object3 {
      background-color: #FFE66D;
    }
    .object4 {
      background-color: #95E1D3;
    }
    .object5 {
      background-color: #C7CEEA;
    }
  </style>
</head>
<body>
  <h1>I spy with my little eye something...</h1>
  <div class="object1">Lamp</div>
  <div class="object2">Desk</div>
  <div class="object3">Book</div>
  <div class="object4">Chair</div>
  <div class="object5">Window</div>
</body>
</html>
